<h2>Vim Commands</h2>
<p>Change windows: <code>ctrl + w</code> (then use the arrow keys to switch window)</p>
<p>Virtical window split: <code>:vsp</code></p>
<p>Horizontal window split: <code>:sp</code></p>
<p>Press <code>s</code> to open file from NERDTree into virtical split
Press <code>i</code> to open file from NERDTree into horizontal split</p>
